name: Check Atlee 2BR Availability

on:
  schedule:
    # Every 5 minutes, 24/7 — the Python script handles business hours gating
    - cron: '*/5 * * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

# Prevent overlapping runs
concurrency:
  group: atlee-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run availability check
        env:
          SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          PHONE_NUMBERS: ${{ secrets.PHONE_NUMBERS }}
        run: python monitor.py

      - name: Commit state changes
        run: |
          git config user.name "atlee-bot"
          git config user.email "atlee-bot@users.noreply.github.com"
          git add last_state.json
          git diff --cached --quiet || git commit -m "Update availability state [skip ci]"
          git pull --rebase
          git push
